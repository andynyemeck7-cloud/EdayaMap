<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EDAYA MAP</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--muted:#888;--primary:#6c5ce7;--accent:#a29bfe;--danger:#ff6b6b;--emerald:#00b894;--glass:rgba(255,255,255,.03)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.tooltip-map{position:fixed;pointer-events:none;z-index:999;background:var(--primary);color:#fff;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.btn{padding:8px 12px;border-radius:8px;font-size:10px;font-weight:900;text-transform:uppercase;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.5px}
.btn-back{background:#1e1e2e;color:var(--text)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}
.btn-secondary{background:#1e1e2e;color:var(--text)}
.btn-emerald{background:var(--emerald);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.main-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;height:calc(100vh - 52px)}
@media(max-width:1023px){.main-grid{grid-template-columns:1fr;grid-template-rows:45vh 1fr}}
.map-side{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.filter-bar{padding:10px;background:rgba(18,18,26,.6);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filter-bar select{padding:8px;background:#1e1e2e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:10px;font-weight:900;outline:none;cursor:pointer}
.map-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px}
.map-container svg{width:100%;height:100%;max-height:90%}
.dept-path{fill:#1a1a2e;stroke:#2d2d44;stroke-width:.5;cursor:pointer;transition:all .2s}
.dept-path:hover{fill:#2a2a4a;stroke:var(--accent)}
.dept-path.selected{fill:var(--primary);stroke:var(--accent);stroke-width:1.5}
.dept-path.has-data{fill:#1e1e3e;stroke:var(--primary);stroke-width:.8}
.list-side{display:flex;flex-direction:column;overflow:hidden}
.list-content{flex:1;overflow-y:auto;padding:16px}
.list-content::-webkit-scrollbar{width:4px}
.list-content::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
.list-header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--primary);padding-bottom:8px;margin-bottom:16px}
.list-header h2{font-size:clamp(18px,3vw,32px);font-weight:900;text-transform:uppercase;font-style:italic;letter-spacing:-1px}
.card{background:var(--glass);padding:16px;border-radius:20px;border:1px solid var(--border);transition:all .2s;margin-bottom:10px}
.card:hover{border-color:rgba(108,92,231,.3)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-info{flex:1;min-width:0;padding-right:12px}
.card-info h4{font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase}
.tag-loc{background:#1e1e2e;color:var(--muted)}
.tag-type{background:rgba(108,92,231,.2);color:var(--accent);border:1px solid rgba(108,92,231,.3)}
.card-actions{display:flex;gap:4px;align-items:center}
.card-actions button{padding:6px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--muted);font-size:14px}
.card-actions button:hover{background:#1e1e2e}
.card-actions .del-btn:hover{background:rgba(255,107,107,.1);color:var(--danger)}
.card-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}
.modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(10,10,15,.92);backdrop-filter:blur(8px)}
.modal{background:var(--card);width:100%;max-width:420px;border-radius:24px;overflow:hidden;border:1px solid var(--border)}
.modal-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-header h3{font-weight:900;text-transform:uppercase;font-style:italic;font-size:13px;letter-spacing:-0.5px}
.modal form{padding:20px;display:flex;flex-direction:column;gap:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:12px;font-weight:700;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--primary)}
.modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal button[type=submit]{padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:10px;cursor:pointer}
.login-page,.menu-page{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;background:var(--bg)}
.login-page h1,.menu-page h1{font-size:clamp(32px,8vw,64px);font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-3px}
.login-page input{padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:16px;color:var(--text);font-weight:700;font-size:14px;width:280px;text-align:center;outline:none}
.menu-btn{padding:20px 40px;border-radius:20px;font-size:14px;font-weight:900;text-transform:uppercase;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;letter-spacing:1px;transition:all .2s;min-width:200px}
.menu-btn:hover{border-color:var(--primary);transform:translateY(-2px)}
.empty{text-align:center;padding:60px 0;opacity:.2;font-weight:900;font-size:10px;text-transform:uppercase}
.checkbox-cell{display:flex;align-items:center;justify-content:center;padding-right:8px}
.checkbox-cell input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
.bulk-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.bulk-bar span{font-size:11px;font-weight:700;color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const firebaseConfig={apiKey:"AIzaSyCSJEBhDAgRVksDBE5Oax-qXFZLMQrE2mw",authDomain:"edayamap.firebaseapp.com",databaseURL:"https://edayamap-default-rtdb.europe-west1.firebasedatabase.app",projectId:"edayamap",storageBucket:"edayamap.firebasestorage.app",messagingSenderId:"652778578559",appId:"1:652778578559:web:8cb7a0f173740dd0ef554a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const FILTERS={
  france:["Lieu","Festival","Booker","Media Spé","Radio"],
  belgium:["Lieu","Festival","Booking","Media Spé","DJ","Management","Marques","Radio"]
};
const GEO_URLS={
  france:'https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson',
  belgium:'https://raw.githubusercontent.com/mathiasleroy/Belgium-Geographic-Data/master/dist/polygons/geojson/Belgium.provinces.WGS84.geojson'
};

// Brussels-Capital Region approximate polygon
const BRUSSELS_GEOJSON = {
  type:"Feature",
  properties:{NameFRE:"Bruxelles-Capitale",name_fr:"Bruxelles-Capitale",name:"Brussels-Capital"},
  geometry:{type:"Polygon",coordinates:[[[4.3137,50.9139],[4.3207,50.9050],[4.3290,50.8960],[4.3380,50.8880],[4.3480,50.8800],[4.3570,50.8740],[4.3670,50.8690],[4.3790,50.8650],[4.3920,50.8630],[4.4060,50.8630],[4.4180,50.8660],[4.4290,50.8710],[4.4380,50.8780],[4.4440,50.8860],[4.4480,50.8950],[4.4490,50.9050],[4.4470,50.9150],[4.4420,50.9240],[4.4340,50.9310],[4.4240,50.9370],[4.4120,50.9410],[4.3990,50.9420],[4.3860,50.9410],[4.3730,50.9380],[4.3600,50.9330],[4.3470,50.9280],[4.3350,50.9230],[4.3240,50.9190],[4.3137,50.9139]]]}
};

// ======= IMPORT INTELLIGENT =======
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function findHeaderRow(rows){
  const keys=['nom','societe','structure','ville','email','mail','instagram','expertise','categorie','adresse','url','site'];
  for(let i=0;i<Math.min(rows.length,10);i++){
    const r=rows[i]||[];
    const matches=r.filter(c=>keys.some(k=>norm(c).includes(k))).length;
    if(matches>=2)return i;
  }
  return 0;
}

function findCol(headers,synonyms){
  for(const syn of synonyms){
    const idx=headers.findIndex(h=>norm(h).includes(syn));
    if(idx>=0)return idx;
  }
  return -1;
}

function detectTypes(sheetName,row,headers,expertiseVal){
  const sn=norm(sheetName);
  const exp=norm(expertiseVal);
  const rowText=norm(row.join(' '));

  if(sn.includes('dj'))return['DJ'];
  if(sn.includes('radio'))return['Radio'];
  if(sn.includes('media'))return['Media Spé'];
  if(sn.includes('marque'))return['Marques'];

  if(sn.includes('management')||sn.includes('booking')||exp.includes('management')||exp.includes('booking')){
    const hasM=exp.includes('management')||sn.includes('management');
    const hasB=exp.includes('booking')||sn.includes('booking');
    if(hasM&&hasB)return['Management','Booking'];
    if(hasB)return['Booking'];
    if(hasM)return['Management'];
    return ['Booking'];
  }

  if(sn.includes('concert')||sn.includes('festival')||sn.includes('lieu')||sn.includes('salle')){
    if(exp.includes('festival')||rowText.includes('festival'))return['Festival'];
    if(exp.includes('lieu')||exp.includes('salle')||exp.includes('concert'))return['Lieu'];
    return['Lieu'];
  }

  return[FILTERS[currentCountry][0]];
}

let currentStep='login', currentCountry=null, localData=[], geoPaths=[];
let selectedDept=null, filterType='All', filterCat='All';
let modalMode=null, activeEntry={};
let hoveredItem=null, mousePos={x:0,y:0};
let selectedKeys=new Set();
let dbRef=null;

function render(){
  const app=document.getElementById('app');
  if(currentStep==='login'){app.innerHTML=renderLogin();bindLogin();return}
  if(currentStep==='menu'){app.innerHTML=renderMenu();bindMenu();return}
  if(currentStep==='map'){app.innerHTML=renderMap();bindMap();return}
}

function renderLogin(){
  return `<div class="login-page"><h1>EDAYA MAP</h1><input id="pwd" type="password" placeholder="Mot de passe" /><button class="btn btn-primary" id="loginBtn" style="width:280px;justify-content:center;padding:14px">ENTRER</button></div>`;
}
function bindLogin(){
  const btn=document.getElementById('loginBtn');
  const pwd=document.getElementById('pwd');
  const go=()=>{if(pwd.value==='EdayaMap'){currentStep='menu';render()}else{alert('Mauvais mot de passe')}};
  btn.onclick=go;pwd.onkeydown=e=>{if(e.key==='Enter')go()};
}

function renderMenu(){
  return `<div class="menu-page"><h1>EDAYA MAP</h1><div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center"><button class="menu-btn" data-c="france">🇫🇷 FRANCE</button><button class="menu-btn" data-c="belgium">🇧🇪 BELGIQUE</button></div></div>`;
}
function bindMenu(){
  document.querySelectorAll('.menu-btn').forEach(b=>b.onclick=()=>{currentCountry=b.dataset.c;currentStep='map';selectedDept=null;filterType='All';filterCat='All';selectedKeys.clear();loadGeo();listenData()});
}

function listenData(){
  if(dbRef)dbRef.off();
  dbRef=db.ref('opportunities_'+currentCountry);
  dbRef.on('value',snap=>{
    const d=snap.val();
    localData=d?Object.keys(d).map(k=>({...d[k],fbKey:k})):[];
    if(currentStep==='map')renderListOnly();
  });
}

function loadGeo(){
  fetch(GEO_URLS[currentCountry]).then(r=>r.json()).then(data=>{
    geoPaths=data.features.map(f=>{
      if(currentCountry==='france')return{id:f.properties.code,name:f.properties.nom,geometry:f.geometry};
      const name=f.properties.NameFRE||f.properties.name_fr||f.properties.name;
      return{id:name,name,geometry:f.geometry};
    });
    if(currentCountry==='belgium'){
      const hasBrussels=geoPaths.some(g=>g.name.toLowerCase().includes('bruxelles'));
      if(!hasBrussels){
        geoPaths.push({id:'Bruxelles-Capitale',name:'Bruxelles-Capitale',geometry:BRUSSELS_GEOJSON.geometry});
      }
    }
    render();
  });
}

function project(coords){
  if(currentCountry==='france')return[(coords[0]+5.15)*44,(51.8-coords[1])*64];
  const scale=120,ox=1.8,oy=51.65;
  return[(coords[0]-ox)*scale,(oy-coords[1])*scale];
}

function pathD(geometry){
  const polys=geometry.type==="Polygon"?[geometry.coordinates]:geometry.coordinates;
  return polys.map(poly=>`M ${poly[0].map(c=>project(c).join(",")).join(" L ")} Z`).join(" ");
}

function filtered(){
  return localData.filter(i=>{
    const t=filterType==='All'||i.type===filterType;
    const c=filterCat==='All'||i.cat===filterCat;
    const d=!selectedDept||String(i.dept)===String(selectedDept);
    return t&&c&&d;
  }).sort((a,b)=>(a.name||'').localeCompare(b.name||'','fr',{sensitivity:'base'}));
}

function deptsWithData(){
  const s=new Set();
  localData.forEach(i=>{if((filterType==='All'||i.type===filterType)&&(filterCat==='All'||i.cat===filterCat))s.add(String(i.dept))});
  return s;
}
function renderMap(){
  const svgVB=currentCountry==='france'?"0 0 600 650":"30 0 530 310";
  const types=FILTERS[currentCountry];
  const dwd=deptsWithData();
  const items=filtered();
  const allSelected=items.length>0&&items.every(i=>selectedKeys.has(i.fbKey));

  return `<div style="display:flex;flex-direction:column;height:100vh" id="mapRoot">
  <div class="tooltip-map" id="tooltip" style="display:none"></div>
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-back" id="backBtn">◀ <span class="hide-sm">RETOUR</span></button>
      <h1 style="font-weight:900;font-style:italic;font-size:18px;text-transform:uppercase;letter-spacing:-1px">EDAYA MAP</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" id="addBtn">＋ <span class="hide-sm">AJOUTER</span></button>
      <button class="btn btn-secondary" id="importBtn">📤 <span class="hide-sm">IMPORTER</span></button>
      <input type="file" id="fileInput" style="display:none" accept=".csv,.xlsx,.xls"/>
      <button class="btn btn-emerald" id="exportBtn">📥 <span class="hide-sm">EXPORTER</span></button>
    </div>
  </header>
  ${selectedKeys.size>0?`<div class="bulk-bar"><span>${selectedKeys.size} sélectionné(s)</span><button class="btn btn-danger" id="bulkDeleteBtn">🗑 SUPPRIMER</button><button class="btn btn-secondary" id="clearSelBtn">DÉSÉLECTIONNER</button></div>`:''}
  <div class="main-grid">
    <div class="map-side">
      <div class="filter-bar">
        <select id="filterType"><option value="All">TOUT TYPE</option>${types.map(t=>`<option ${filterType===t?'selected':''}>${t}</option>`).join('')}</select>
        <select id="filterCat"><option value="All">STATUT</option><option ${filterCat==='Accessible'?'selected':''}>Accessible</option><option ${filterCat==='Plus tard'?'selected':''}>Plus tard</option></select>
      </div>
      <div class="map-container">
        ${geoPaths.length===0?'<div style="opacity:.3;font-weight:900;font-size:10px">Chargement...</div>':`
        <svg viewBox="${svgVB}">
          ${geoPaths.map(g=>{
            const isBxl=g.name&&g.name.toLowerCase().includes('bruxelles');
            const sel=String(selectedDept)===String(g.id)?'selected':'';
            const hd=dwd.has(String(g.id))?'has-data':'';
            let extra='';
            if(isBxl){
              const cx=project([4.38,50.89]);
              extra=`<circle cx="${cx[0]}" cy="${cx[1]}" r="6" fill="${sel?'var(--primary)':'#ff6b35'}" stroke="#fff" stroke-width="1.5" style="cursor:pointer" data-id="${g.id}" data-name="${g.name}" class="dept-path ${sel} ${hd}"/>
              <text x="${cx[0]}" y="${cx[1]-10}" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">BXL</text>`;
            }
            return `<path d="${pathD(g.geometry)}" class="dept-path ${sel} ${hd}" data-id="${g.id}" data-name="${g.name}" ${isBxl?'style="stroke-width:2;stroke:#ff6b35"':''}/>${extra}`;
          }).join('')}
        </svg>`}
      </div>
    </div>
    <div class="list-side" id="listSide">
      ${renderList(items,allSelected)}
    </div>
  </div>
  ${modalMode?renderModal():''}
  </div>`;
}

function renderList(items,allSelected){
  return `<div class="list-content">
    <div class="list-header">
      <h2>${selectedDept?'Zone '+selectedDept:'Opportunités'}</h2>
      <div style="display:flex;gap:8px;align-items:center">
        ${selectedDept?'<button class="btn btn-secondary" id="clearDeptBtn">Voir tout</button>':''}
      </div>
    </div>
    ${items.length>0?`<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px"><label style="font-size:10px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="selectAll" ${allSelected?'checked':''} style="accent-color:var(--primary);width:14px;height:14px"/>TOUT SÉLECTIONNER</label></div>`:''}
    ${items.length>0?items.map(i=>`<div class="card">
      <div class="card-top">
        <div class="checkbox-cell"><input type="checkbox" class="item-cb" data-key="${i.fbKey}" ${selectedKeys.has(i.fbKey)?'checked':''}/></div>
        <div class="card-info">
          <h4>${esc(i.name)}</h4>
          <div class="card-tags">
            <span class="tag tag-loc">${esc(i.city)} (${esc(i.dept)})</span>
            <span class="tag tag-type">${esc(i.type)}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="edit-btn" data-key="${i.fbKey}" title="Modifier">✏️</button>
          <button class="del-btn" data-key="${i.fbKey}" title="Supprimer">🗑️</button>
        </div>
      </div>
      <p class="card-note">${esc(i.address||'...')}</p>
    </div>`).join(''):'<div class="empty">Aucun résultat</div>'}
  </div>`;
}

function renderListOnly(){
  const ls=document.getElementById('listSide');
  if(!ls)return;
  const items=filtered();
  const allSelected=items.length>0&&items.every(i=>selectedKeys.has(i.fbKey));
  ls.innerHTML=renderList(items,allSelected);
  bindListEvents();
  const existing=document.querySelector('.bulk-bar');
  if(selectedKeys.size>0&&!existing){
    const mg=document.querySelector('.main-grid');
    if(mg){const bar=document.createElement('div');bar.className='bulk-bar';bar.innerHTML=`<span>${selectedKeys.size} sélectionné(s)</span><button class="btn btn-danger" id="bulkDeleteBtn">🗑 SUPPRIMER</button><button class="btn btn-secondary" id="clearSelBtn">DÉSÉLECTIONNER</button>`;mg.before(bar);document.getElementById('bulkDeleteBtn').onclick=bulkDelete;document.getElementById('clearSelBtn').onclick=()=>{selectedKeys.clear();renderListOnly()}}
  } else if(selectedKeys.size===0&&existing){existing.remove()}
  else if(existing){existing.querySelector('span').textContent=selectedKeys.size+' sélectionné(s)'}
}

function renderModal(){
  const types=FILTERS[currentCountry];
  const e=activeEntry;
  return `<div class="modal-overlay" id="modalOverlay"><div class="modal">
    <div class="modal-header"><h3>${modalMode==='add'?'Ajouter':'Modifier'}</h3><button id="closeModal" style="background:none;border:none;color:var(--text);font-size:18px;cursor:pointer">✕</button></div>
    <form id="entryForm">
      <input required placeholder="Nom structure" value="${esc(e.name||'')}" name="name"/>
      <div class="row2"><input required placeholder="Ville" value="${esc(e.city||'')}" name="city"/><input required placeholder="Zone" value="${esc(e.dept||'')}" name="dept"/></div>
      <div class="row2">
        <select name="type">${types.map(t=>`<option ${e.type===t?'selected':''}>${t}</option>`).join('')}</select>
        <select name="cat"><option ${e.cat==='Accessible'?'selected':''}>Accessible</option><option ${e.cat==='Plus tard'?'selected':''}>Plus tard</option></select>
      </div>
      <textarea placeholder="Notes / Adresse" name="address" rows="3">${esc(e.address||'')}</textarea>
      <button type="submit">Enregistrer</button>
    </form>
  </div></div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function bindMap(){
  document.getElementById('backBtn').onclick=()=>{currentStep='menu';if(dbRef)dbRef.off();selectedKeys.clear();render()};
  document.getElementById('addBtn').onclick=()=>{modalMode='add';activeEntry={name:'',city:'',dept:'',type:FILTERS[currentCountry][0],cat:'Accessible',address:''};render()};
  document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange=handleImport;
  document.getElementById('exportBtn').onclick=handleExport;

  if(document.getElementById('bulkDeleteBtn'))document.getElementById('bulkDeleteBtn').onclick=bulkDelete;
  if(document.getElementById('clearSelBtn'))document.getElementById('clearSelBtn').onclick=()=>{selectedKeys.clear();render()};

  document.getElementById('filterType').onchange=e=>{filterType=e.target.value;selectedDept=null;selectedKeys.clear();renderListOnly();updateMapHighlights()};
  document.getElementById('filterCat').onchange=e=>{filterCat=e.target.value;selectedDept=null;selectedKeys.clear();renderListOnly();updateMapHighlights()};

  const tooltip=document.getElementById('tooltip');
  document.querySelectorAll('.dept-path').forEach(p=>{
    p.onmouseenter=()=>{tooltip.style.display='block';tooltip.textContent=p.dataset.name};
    p.onmouseleave=()=>{tooltip.style.display='none'};
    p.onclick=()=>{selectedDept=selectedDept===p.dataset.id?null:p.dataset.id;selectedKeys.clear();updateMapHighlights();renderListOnly()};
  });
  document.getElementById('mapRoot').onmousemove=e=>{tooltip.style.left=e.clientX+15+'px';tooltip.style.top=e.clientY-15+'px'};

  bindListEvents();
  if(modalMode)bindModal();
}

function bindListEvents(){
  document.querySelectorAll('.edit-btn').forEach(b=>b.onclick=()=>{
    const item=localData.find(i=>i.fbKey===b.dataset.key);
    if(item){modalMode='edit';activeEntry={...item};render()}
  });
  document.querySelectorAll('.del-btn').forEach(b=>b.onclick=()=>{
    if(confirm('Supprimer ?'))db.ref('opportunities_'+currentCountry+'/'+b.dataset.key).remove();
  });
  document.querySelectorAll('.item-cb').forEach(cb=>{
    cb.onchange=()=>{
      if(cb.checked)selectedKeys.add(cb.dataset.key);else selectedKeys.delete(cb.dataset.key);
      renderListOnly();
    };
  });
  const sa=document.getElementById('selectAll');
  if(sa)sa.onchange=()=>{
    const items=filtered();
    if(sa.checked)items.forEach(i=>selectedKeys.add(i.fbKey));
    else items.forEach(i=>selectedKeys.delete(i.fbKey));
    renderListOnly();
  };
  if(document.getElementById('clearDeptBtn'))document.getElementById('clearDeptBtn').onclick=()=>{selectedDept=null;selectedKeys.clear();updateMapHighlights();renderListOnly()};
}

function bulkDelete(){
  if(selectedKeys.size===0)return;
  if(!confirm(`Supprimer ${selectedKeys.size} fiche(s) ?`))return;
  const promises=[...selectedKeys].map(k=>db.ref('opportunities_'+currentCountry+'/'+k).remove());
  Promise.all(promises).then(()=>{selectedKeys.clear()});
}

function updateMapHighlights(){
  const dwd=deptsWithData();
  document.querySelectorAll('.dept-path').forEach(p=>{
    p.classList.toggle('selected',String(selectedDept)===p.dataset.id);
    p.classList.toggle('has-data',dwd.has(p.dataset.id));
  });
}

function bindModal(){
  document.getElementById('closeModal').onclick=()=>{modalMode=null;render()};
  document.getElementById('modalOverlay').onclick=e=>{if(e.target.id==='modalOverlay'){modalMode=null;render()}};
  document.getElementById('entryForm').onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const obj=Object.fromEntries(fd);
    const path='opportunities_'+currentCountry;
    if(modalMode==='add'){db.ref(path).push({...obj,id:Date.now()})}
    else{const{fbKey,...data}=activeEntry;db.ref(path+'/'+fbKey).set({...data,...obj})}
    modalMode=null;render();
  };
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    let allData=[];
    const typesSummary={};
    try{
      const processRows=(sheetName,rows)=>{
        const headerIdx=findHeaderRow(rows);
        const headers=rows[headerIdx]||[];
        const cNom=findCol(headers,['nom','societe','structure','marque','artist']);
        const cVille=findCol(headers,['ville','city','location']);
        const cExp=findCol(headers,['expertise','specialit','domaine']);
        const cCat=findCol(headers,['categorie','status','statut','accessib']);
        const cInsta=findCol(headers,['instagram','insta','reseau','social']);
        const cUrl=findCol(headers,['url','site','web','lien']);
        const cEmail=findCol(headers,['email','mail','contact']);
        const cAddr=findCol(headers,['adresse','address']);
        const cDept=findCol(headers,['province','departement','département','region','zone']);

        rows.slice(headerIdx+1).forEach(row=>{
          if(!row)return;
          const name=String(row[cNom>=0?cNom:0]||'').trim();
          if(!name||norm(name)==='nom')return;
          const expertiseVal=cExp>=0?String(row[cExp]||''):'';
          const city=cVille>=0?String(row[cVille]||'').trim():'';
          const dept=cDept>=0?String(row[cDept]||'').trim():city;
          const cat=cCat>=0?String(row[cCat]||'').trim():'';
          let url=cUrl>=0?String(row[cUrl]||'').trim():'';
          const insta=cInsta>=0?String(row[cInsta]||'').trim():'';
          let email=cEmail>=0?String(row[cEmail]||'').trim():'';
          const address=cAddr>=0?String(row[cAddr]||'').trim():'';

          // Si email contient une URL, on la déplace vers URL
          if(email&&/^https?:\/\/|www\.|\.com|\.be|\.fr|instagram\.com/i.test(email)&&!email.includes('@')){
            if(!url)url=email;
            email='';
          }
          if(!url&&insta)url=insta;

          const types=detectTypes(sheetName,row,headers,expertiseVal);
          types.forEach(t=>{
            typesSummary[t]=(typesSummary[t]||0)+1;
            allData.push({name,city,dept,type:t,cat:cat||'Accessible',url,email,address});
          });
        });
      };

      if(file.name.endsWith('.xlsx')||file.name.endsWith('.xls')){
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        wb.SheetNames.forEach(sn=>{
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
          processRows(sn,rows);
        });
      }else{
        const content=ev.target.result;
        const sep=content.includes(';')?';':',';
        const lines=content.split(/\r?\n/).filter(l=>l.trim());
        const rows=lines.map(line=>line.split(new RegExp(`${sep}(?=(?:(?:[^"]*"){2})*[^"]*$)`)).map(p=>p.replace(/^"|"$/g,'').trim()));
        processRows(file.name.replace(/\.[^.]+$/,''),rows);
      }

      // Déduplication : clef = Nom + Type
      const existing=new Set(localData.map(i=>norm(i.name)+'|'+norm(i.type)));
      const seen=new Set();
      const finalData=allData.filter(i=>{
        const k=norm(i.name)+'|'+norm(i.type);
        if(existing.has(k)||seen.has(k))return false;
        seen.add(k);return true;
      });

      if(finalData.length===0){alert("Pas de nouveautés.");return}
      const summary=Object.entries(typesSummary).map(([t,n])=>`• ${n} ${t}`).join('\n');
      if(confirm(`Importer ${finalData.length} fiches ?\n\n${summary}`)){
        const promises=finalData.map(item=>db.ref('opportunities_'+currentCountry).push({...item,id:Date.now()+Math.random()}));
        await Promise.all(promises);
        alert("Importé avec succès !");
      }
    }catch(err){alert("Erreur d'import : "+err.message);console.error(err)}
  };
  if(file.name.endsWith('.xlsx')||file.name.endsWith('.xls'))reader.readAsBinaryString(file);
  else reader.readAsText(file);
  e.target.value='';
}

function handleExport(){
  const headers=["Nom","Ville","Département","Type","Catégorie","URL","Email","Adresse"];
  const rows=localData.map(i=>[`"${i.name}"`,`"${i.city}"`,i.dept,i.type,i.cat,`"${i.url}"`,`"${i.email}"`,`"${i.address}"`]);
  const csv="\uFEFF"+headers.join(";")+"\n"+rows.map(e=>e.join(";")).join("\n");
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement("a");link.href=URL.createObjectURL(blob);link.download=`edaya_${currentCountry}.csv`;link.click();
}

render();
</script>
