<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EDAYA MAP</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--muted:#888;--primary:#6c5ce7;--accent:#a29bfe;--danger:#ff6b6b;--emerald:#00b894;--glass:rgba(255,255,255,.03)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.tooltip-map{position:fixed;pointer-events:none;z-index:999;background:var(--primary);color:#fff;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.btn{padding:8px 12px;border-radius:8px;font-size:10px;font-weight:900;text-transform:uppercase;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.5px}
.btn-back{background:#1e1e2e;color:var(--text)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}
.btn-secondary{background:#1e1e2e;color:var(--text)}
.btn-emerald{background:var(--emerald);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.main-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;height:calc(100vh - 52px)}
@media(max-width:1023px){.main-grid{grid-template-columns:1fr;grid-template-rows:45vh 1fr}}
.map-side{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.filter-bar{padding:10px;background:rgba(18,18,26,.6);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filter-bar select{padding:8px;background:#1e1e2e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:10px;font-weight:900;outline:none;cursor:pointer}
.map-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px}
.map-container svg{width:100%;height:100%;max-height:90%}
.dept-path{fill:#1a1a2e;stroke:#2d2d44;stroke-width:.5;cursor:pointer;transition:all .2s}
.dept-path:hover{fill:#2a2a4a;stroke:var(--accent)}
.dept-path.selected{fill:var(--primary);stroke:var(--accent);stroke-width:1.5}
.dept-path.has-data{fill:#1e1e3e;stroke:var(--primary);stroke-width:.8}
.list-side{display:flex;flex-direction:column;overflow:hidden}
.list-content{flex:1;overflow-y:auto;padding:16px}
.list-content::-webkit-scrollbar{width:4px}
.list-content::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
.list-header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--primary);padding-bottom:8px;margin-bottom:16px}
.list-header h2{font-size:clamp(18px,3vw,32px);font-weight:900;text-transform:uppercase;font-style:italic;letter-spacing:-1px}
.card{background:var(--glass);padding:16px;border-radius:20px;border:1px solid var(--border);transition:all .2s;margin-bottom:10px}
.card:hover{border-color:rgba(108,92,231,.3)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-info{flex:1;min-width:0;padding-right:12px}
.card-info h4{font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase}
.tag-loc{background:#1e1e2e;color:var(--muted)}
.tag-type{background:rgba(108,92,231,.2);color:var(--accent);border:1px solid rgba(108,92,231,.3)}
.card-actions{display:flex;gap:4px;align-items:center}
.card-actions button{padding:6px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--muted);font-size:14px}
.card-actions button:hover{background:rgba(255,255,255,.05);color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);width:100%;max-width:450px;border-radius:30px;border:1px solid var(--border);overflow:hidden;animation:pop .3s ease-out}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:20px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:14px;font-weight:900;text-transform:uppercase;font-style:italic}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:12px}
.modal-body input, .modal-body select, .modal-body textarea{width:100%;padding:14px;background:#1e1e2e;border:1px solid var(--border);border-radius:12px;color:#fff;font-size:12px;font-weight:600;outline:none}
.modal-body input:focus{border-color:var(--primary)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.login-screen{height:100vh;display:flex;items-center;justify-content:center;background:radial-gradient(circle at center, #1e1e3e 0%, #0a0a0f 100%)}
.login-box{background:var(--card);padding:40px;border-radius:40px;border:1px solid var(--border);text-align:center;width:100%;max-width:350px}
.menu-screen{height:100vh;display:flex;align-items:center;justify-content:center;gap:20px;flex-direction:column}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:600px;padding:20px}
.country-btn{background:var(--card);border:1px solid var(--border);padding:40px;border-radius:40px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:15px}
.country-btn:hover{background:var(--primary);transform:translateY(-5px)}
.country-btn span{font-size:50px}
.country-btn h3{font-weight:900;text-transform:uppercase;font-style:italic}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const firebaseConfig={apiKey:"AIzaSyCSJEBhDAgRVksDBE5Oax-qXFZLMQrE2mw",authDomain:"edayamap.firebaseapp.com",databaseURL:"https://edayamap-default-rtdb.europe-west1.firebasedatabase.app",projectId:"edayamap",storageBucket:"edayamap.firebasestorage.app",messagingSenderId:"652778578559",appId:"1:652778578559:web:8cb7a0f173740dd0ef554a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const GEO_URLS={
  france:'https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson',
  belgium:'https://raw.githubusercontent.com/justinelliotmeyers/Belgium_GeoJSON/master/belgium_provinces.geojson'
};

const FILTERS={
  france:['Lieu','Festival','Booker','Media Spé','Radio'],
  belgium:['Lieu','Festival','Booking','Media Spé','DJ','Management','Marques','Radio']
};

let currentStep='login';
let currentCountry=null;
let localData=[];
let geoPaths=[];
let selectedDept=null;
let filters={type:'All',cat:'All'};
let modal=null;
let hoveredDept=null;
let mousePos={x:0,y:0};

function render(){
  const root=document.getElementById('app');
  if(currentStep==='login'){
    root.innerHTML=`<div class="login-screen"><div class="login-box"><h1 style="font-weight:900;font-style:italic;margin-bottom:20px">EDAYA MAP</h1><input type="password" id="pass" placeholder="Mot de passe" style="width:100%;padding:14px;background:#1e1e2e;border:1px solid #333;border-radius:12px;color:#fff;text-align:center;margin-bottom:15px;outline:none"><button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="handleLogin()">ENTRER</button></div></div>`;
    return;
  }
  if(currentStep==='menu'){
    root.innerHTML=`<div class="menu-screen"><h2 style="font-weight:900;font-style:italic;text-transform:uppercase;font-size:24px">Choisissez une zone</h2><div class="menu-grid"><div class="country-btn" onclick="selectCountry('france')"><span>🇫🇷</span><h3>France</h3></div><div class="country-btn" onclick="selectCountry('belgium')"><span>🇧🇪</span><h3>Belgique</h3></div></div></div>`;
    return;
  }
  
  const filtered=localData.filter(i=>{
    const t=filters.type==='All'||i.type===filters.type;
    const c=filters.cat==='All'||i.cat===filters.cat;
    const d=!selectedDept||String(i.dept)===String(selectedDept);
    return t&&c&&d;
  }).sort((a,b)=>a.name.localeCompare(b.name));

  const deptsWithData=new Set();
  localData.forEach(i=>{
    if((filters.type==='All'||i.type===filters.type)&&(filters.cat==='All'||i.cat===filters.cat)) deptsWithData.add(String(i.dept));
  });

  root.innerHTML=`
    <div style="display:flex;flex-direction:column;height:100vh">
      <header>
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn-back" onclick="currentStep='menu';selectedDept=null;render()">← RETOUR</button>
          <h1 style="font-weight:900;font-style:italic;font-size:18px">EDAYA MAP ${currentCountry.toUpperCase()}</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="openModal('add')">+ AJOUTER</button>
          <button class="btn btn-secondary" onclick="document.getElementById('xlsx-input').click()">↑ IMPORTER EXCEL</button>
          <input type="file" id="xlsx-input" class="hidden" accept=".xlsx,.xls,.csv" onchange="handleImport(event)">
          <button class="btn btn-emerald" onclick="handleExport()">↓ EXPORTER</button>
        </div>
      </header>
      <div class="main-grid">
        <div class="map-side">
          <div class="filter-bar">
            <select onchange="filters.type=this.value;selectedDept=null;render()">
              <option value="All">TOUT TYPE</option>
              ${FILTERS[currentCountry].map(t=>`<option value="${t}" ${filters.type===t?'selected':''}>${t}</option>`).join('')}
            </select>
            <select onchange="filters.cat=this.value;selectedDept=null;render()">
              <option value="All">STATUT</option><option ${filters.cat==='Accessible'?'selected':''}>Accessible</option><option ${filters.cat==='Plus tard'?'selected':''}>Plus tard</option>
            </select>
          </div>
          <div class="map-container">
            <svg viewBox="${currentCountry==='france'?'0 0 600 650':'0 0 550 500'}">
              ${geoPaths.map(p=>`
                <path d="${renderPath(p.geometry)}" 
                  class="dept-path ${String(selectedDept)===String(p.id)?'selected':''} ${deptsWithData.has(String(p.id))?'has-data':''}"
                  onclick="selectedDept=(selectedDept==='${p.id}'?null:'${p.id}');render()"
                  onmouseenter="hoveredDept='${p.name}';render()"
                  onmouseleave="hoveredDept=null;render()"
                />
              `).join('')}
            </svg>
          </div>
        </div>
        <div class="list-side">
          <div class="list-content">
            <div class="list-header">
              <h2>${selectedDept?selectedDept:'TOUTES LES ZONES'}</h2>
              ${selectedDept?`<button style="font-size:10px;font-weight:900;color:var(--muted);background:none;border:none;cursor:pointer" onclick="selectedDept=null;render()">VOIR TOUT</button>`:''}
            </div>
            ${filtered.length?filtered.map(i=>`
              <div class="card">
                <div class="card-top">
                  <div class="card-info">
                    <h4>${i.name}</h4>
                    <div class="card-tags">
                      <span class="tag tag-loc">${i.city} (${i.dept})</span>
                      <span class="tag tag-type">${i.type}</span>
                    </div>
                  </div>
                  <div class="card-actions">
                    <button onclick="openModal('edit','${i.fbKey}')">✎</button>
                    <button onclick="handleDelete('${i.fbKey}')" style="color:var(--danger)">✖</button>
                  </div>
                </div>
              </div>
            `).join(''):'<div style="text-align:center;padding:40px;opacity:.2;font-weight:900">AUCUN RÉSULTAT</div>'}
          </div>
        </div>
      </div>
    </div>
    ${hoveredDept?`<div class="tooltip-map" style="left:${mousePos.x+15}px;top:${mousePos.y-15}px">${hoveredDept}</div>`:''}
    ${modal?renderModal():''}
  `;
}

function handleLogin(){
  if(document.getElementById('pass').value==='EdayaMap'){currentStep='menu';render();}
  else alert('Incorrect');
}

function selectCountry(c){
  currentCountry=c;
  currentStep='map';
  filters={type:'All',cat:'All'};
  loadGeo();
  db.ref('opportunities_'+currentCountry).on('value',s=>{
    const d=s.val();
    localData=d?Object.keys(d).map(k=>({...d[k],fbKey:k})):[];
    render();
  });
}

function loadGeo(){
  fetch(GEO_URLS[currentCountry]).then(r=>r.json()).then(data=>{
    geoPaths=data.features.map(f=>{
      if(currentCountry==='france')return{id:f.properties.code,name:f.properties.nom,geometry:f.geometry};
      const name=f.properties.NAME_1 || f.properties.NameFRE || f.properties.name || "Province";
      return{id:name,name,geometry:f.geometry};
    });
    render();
  });
}

function project(coords){
  if(currentCountry==='france')return[(coords[0]+5.15)*44,(51.8-coords[1])*64];
  // Belgique ajustée pour être entière et centrée
  return [(coords[0]-1.22)*85,(52.6-coords[1])*120];
}

function renderPath(geo){
  const polys=geo.type==="Polygon"?[geo.coordinates]:geo.coordinates;
  return polys.map(poly=>`M ${poly[0].map(c=>project(c).join(",")).join(" L ")} Z`).join(" ");
}

async function handleImport(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async (evt)=>{
    try{
      let allData=[];
      const workbook=XLSX.read(evt.target.result,{type:'binary'});
      
      // On parcourt TOUTES les feuilles de l'Excel
      workbook.SheetNames.forEach(sheetName=>{
        const sheet=workbook.Sheets[sheetName];
        const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
        if(rows.length<2) return;

        // Trouver la ligne d'entête (celle qui contient "Nom" ou "Structure")
        let headerIdx=-1;
        for(let i=0; i<Math.min(10, rows.length); i++){
          if(rows[i].some(cell=>String(cell).toLowerCase().includes('nom'))) { headerIdx=i; break; }
        }
        if(headerIdx===-1) headerIdx=0;

        const headers=rows[headerIdx].map(h=>String(h||'').toLowerCase().trim());
        const findCol=(keys)=>headers.findIndex(h=>keys.some(k=>h.includes(k)));

        const idx={
          name: findCol(['nom','structure','société','artistes']),
          city: findCol(['ville','city']),
          dept: findCol(['département','zone','province',' Name_FR','Name_NL']),
          type: findCol(['type','expertise','savoir-faire','catégorie']),
          email: findCol(['mail','email']),
          address: findCol(['adresse'])
        };

        const sheetData=rows.slice(headerIdx+1).map(row=>{
          const name=idx.name!==-1?row[idx.name]:'';
          if(!name) return null;
          
          let city=idx.city!==-1?row[idx.city]:'';
          let dept=idx.dept!==-1?String(row[idx.dept]||''):'';
          
          // Correction auto pour la Belgique (Bruxelles)
          if(currentCountry==='belgium' && !dept && String(city).toLowerCase().includes('bruxelles')) dept='Bruxelles-Capitale';

          return {
            name: String(name).trim(),
            city: String(city||'').trim(),
            dept: String(dept||'').replace(/^0(?=\d)/,'').trim(),
            type: idx.type!==-1?String(row[idx.type]||''):FILTERS[currentCountry][0],
            cat: 'Accessible',
            address: idx.address!==-1?String(row[idx.address]||''):'',
            email: idx.email!==-1?String(row[idx.email]||''):'',
            id: Date.now()+Math.random()
          };
        }).filter(i=>i && i.name);
        
        allData=[...allData, ...sheetData];
      });

      const existing=new Set(localData.map(i=>i.name.trim().toLowerCase()));
      const finalData=allData.filter(i=>!existing.has(i.name.toLowerCase()));

      if(finalData.length===0){alert("Aucune nouvelle donnée trouvée.");return;}
      if(confirm(`Importer ${finalData.length} nouveaux contacts ?`)){
        const p=finalData.map(i=>db.ref('opportunities_'+currentCountry).push(i));
        await Promise.all(p);
        alert("Importation réussie !");
      }
    }catch(err){alert("Erreur : "+err.message)}
  };
  reader.readAsBinaryString(file);
  e.target.value='';
}

function handleExport(){
  const headers=["Nom","Ville","Département","Type","Statut","Email","Adresse"];
  const rows=localData.map(i=>[`"${i.name}"`,`"${i.city}"`,i.dept,i.type,i.cat,i.email,`"${i.address}"`]);
  const csv="\uFEFF"+headers.join(";")+"\n"+rows.map(r=>r.join(";")).join("\n");
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);link.download=`edaya_${currentCountry}.csv`;link.click();
}

function openModal(mode,key=null){
  const types=FILTERS[currentCountry];
  let entry={name:'',city:'',dept:'',type:types[0],cat:'Accessible',address:'',email:''};
  if(mode==='edit'){entry=localData.find(i=>i.fbKey===key);}
  modal={mode,entry};
  render();
}

function renderModal(){
  const e=modal.entry;
  const types=FILTERS[currentCountry];
  return `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header"><h3>${modal.mode==='add'?'AJOUTER':'MODIFIER'}</h3><button onclick="modal=null;render()" style="background:none;border:none;color:#fff;cursor:pointer">✖</button></div>
        <div class="modal-body">
          <input id="m_name" placeholder="Nom" value="${e.name}">
          <div class="row2">
            <input id="m_city" placeholder="Ville" value="${e.city}">
            <input id="m_dept" placeholder="Zone/Dept" value="${e.dept}">
          </div>
          <div class="row2">
            <select id="m_type">${types.map(t=>`<option ${e.type===t?'selected':''}>${t}</option>`).join('')}</select>
            <select id="m_cat"><option ${e.cat==='Accessible'?'selected':''}>Accessible</option><option ${e.cat==='Plus tard'?'selected':''}>Plus tard</option></select>
          </div>
          <input id="m_email" placeholder="Email" value="${e.email||''}">
          <textarea id="m_addr" placeholder="Adresse / Notes" rows="3">${e.address}</textarea>
          <button class="btn btn-primary" style="justify-content:center;padding:14px" onclick="saveModal()">ENREGISTRER</button>
        </div>
      </div>
    </div>
  `;
}

function saveModal(){
  const entry={
    name:document.getElementById('m_name').value,
    city:document.getElementById('m_city').value,
    dept:document.getElementById('m_dept').value,
    type:document.getElementById('m_type').value,
    cat:document.getElementById('m_cat').value,
    email:document.getElementById('m_email').value,
    address:document.getElementById('m_addr').value,
    id:modal.entry.id||Date.now()
  };
  const path='opportunities_'+currentCountry;
  if(modal.mode==='add') db.ref(path).push(entry);
  else db.ref(path+'/'+modal.entry.fbKey).set(entry);
  modal=null;render();
}

function handleDelete(k){if(confirm('Supprimer ?'))db.ref('opportunities_'+currentCountry+'/'+k).remove();}

window.addEventListener('mousemove',e=>{mousePos={x:e.clientX,y:e.clientY};if(hoveredDept)render();});
render();
</script>
</body>
</html>
