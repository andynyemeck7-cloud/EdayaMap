<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDAYA MAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        /* Styles Communs aux Cartes */
        .dept-path { fill: #1e293b; stroke: #334155; stroke-width: 0.6; transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .dept-path:hover { fill: #334155; stroke: #6366f1; }
        .dept-path.has-data { fill: #1e1b4b; stroke: #6366f1; stroke-width: 0.8; }
        .dept-path.selected { fill: #4338ca; stroke: #ffffff; stroke-width: 1.5; }
        
        /* Styles Spécifiques Belgique (Inspirés de l'Image PNG) */
        .province-label { fill: rgba(255,255,255,0.6); font-size: 8px; font-weight: 700; pointer-events: none; text-transform: uppercase; text-anchor: middle; }

        /* Layout Principal */
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        @media (min-width: 1024px) {
            .app-grid { display: grid; grid-template-columns: 1fr 1.2fr; height: calc(100vh - 70px); overflow: hidden; }
            .sidebar-map { border-right: 1px solid rgba(255,255,255,0.05); }
        }

        /* Mobile : Map centrée et Bottom Sheet */
        @media (max-width: 1023px) {
            .sidebar-map { height: 45vh; flex: none; background: rgba(15, 23, 42, 0.4); }
            .mobile-bottom-sheet {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: #0f172a;
                border-top: 1px solid rgba(255,255,255,0.1);
                border-top-left-radius: 2rem; border-top-right-radius: 2rem;
                z-index: 40;
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                height: 75vh;
            }
            .sheet-closed { transform: translateY(calc(75vh - 60px)); }
            .sheet-open { transform: translateY(0); }
        }

        /* Centrage et Calibration de la Map */
        .map-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; cursor: crosshair; }
        .france-svg { width: 100%; height: auto; max-height: 95%; transform: translateY(-30px); filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); }

        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .header-scroll { overflow-x: auto; white-space: nowrap; }
        .header-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCSJEBhDAgRVksDBE5Oax-qXFZLMQrE2mw",
            authDomain: "edayamap.firebaseapp.com",
            databaseURL: "https://edayamap-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "edayamap",
            storageBucket: "edayamap.firebasestorage.app",
            messagingSenderId: "652778578559",
            appId: "1:652778578559:web:8cb7a0f173740dd0ef554a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Icon = ({ name }) => {
            if (name === 'plus') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
            if (name === 'edit') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
            if (name === 'trash') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
            if (name === 'upload') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
            if (name === 'download') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
            if (name === 'back') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg>;
            if (name === 'x') return <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
            return null;
        };

        const App = () => {
            const [step, setStep] = useState('login'); 
            const [country, setCountry] = useState(null);
            const [pass, setPass] = useState('');
            const [localData, setLocalData] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);
            const [filters, setFilters] = useState({ type: 'All', cat: 'All' });
            const [geoPaths, setGeoPaths] = useState([]);
            const [modalMode, setModalMode] = useState(null);
            const [activeEntry, setActiveEntry] = useState(null);
            const [isSheetOpen, setIsSheetOpen] = useState(false);
            const fileInputRef = useRef(null);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === 'EdayaMap') setStep('menu');
                else alert('Mot de passe incorrect');
            };

            useEffect(() => {
                if (step !== 'map') return;
                const dataRef = db.ref(`opportunities_${country}`);
                dataRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.keys(data).map(key => ({ ...data[key], fbKey: key })) : [];
                    setLocalData(list);
                });
                return () => dataRef.off();
            }, [step, country]);

            useEffect(() => {
                if (step !== 'map' || country !== 'france') return;
                // GeoJSON France (Sud de la France remonté)
                const url = 'https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson';
                fetch(url).then(res => res.json()).then(data => {
                    setGeoPaths(data.features.map(f => ({ 
                        id: f.properties.code, name: f.properties.nom, geometry: f.geometry 
                    })));
                });
            }, [step, country]);

            // Projection Calibrée pour France et Belgique (Même Taille, Centré)
            const project = (coords) => {
                if (country === 'france') {
                    // France : ProjectionGeoJSON, remonté pour ne pas couper le Sud
                    return [(coords[0] + 5.15) * 55, (52.25 - coords[1]) * 78]; 
                }
                // Belgique Vectorielle : Pas de projection, utilise coordonnées SVG directes
                return coords;
            };

            const renderPath = (geometry) => {
                if (country === 'france') {
                    const polys = geometry.type === "Polygon" ? [geometry.coordinates] : geometry.coordinates;
                    return polys.map(poly => `M ${poly[0].map(c => project(c).join(",")).join(" L ")} Z`).join(" ");
                }
                // Belgique utilise déjà des points SVG directs
                return geometry; 
            };

            const filteredData = useMemo(() => {
                return localData
                    .filter(i => {
                        const t = filters.type === 'All' || i.type === filters.type;
                        const c = filters.cat === 'All' || i.cat === filters.cat;
                        const d = !selectedDept || String(i.dept) === String(selectedDept);
                        return t && c && d;
                    })
                    .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
            }, [localData, filters, selectedDept]);

            const deptsWithData = useMemo(() => {
                const visibleSet = new Set();
                localData.forEach(i => {
                    if ((filters.type === 'All' || i.type === filters.type) && (filters.cat === 'All' || i.cat === filters.cat)) {
                        visibleSet.add(String(i.dept));
                    }
                });
                return visibleSet;
            }, [localData, filters]);

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const content = event.target.result;
                    const lines = content.split(/\r?\n/).filter(l => l.trim());
                    const sep = content.includes(';') ? ';' : ',';
                    const existingNames = new Set(localData.map(item => item.name.trim().toLowerCase()));
                    const allData = lines.slice(1).map(line => {
                        const parts = line.split(new RegExp(`${sep}(?=(?:(?:[^"]*"){2})*[^"]*$)`)).map(p => p.replace(/^"|"$/g, '').trim());
                        return { name: parts[1] || "", city: parts[2] || "", dept: String(parts[3] || "").replace(/^0(?=\d)/, ''), type: parts[4] || "", cat: parts[5] || "", url: parts[6] || "", email: parts[7] || "", address: parts[8] || "" };
                    }).filter(i => i.name);
                    const finalData = allData.filter(item => !existingNames.has(item.name.trim().toLowerCase()));
                    if (finalData.length === 0) { alert("Pas de nouveautés."); return; }
                    if(confirm(`Importer ${finalData.length} fiches ?`)) {
                        try {
                            const promises = finalData.map(item => db.ref(`opportunities_${country}`).push({ ...item, id: Date.now() + Math.random() }));
                            await Promise.all(promises); alert("Ok !");
                        } catch (err) { alert(err.message); }
                    }
                };
                reader.readAsText(file);
            };

            const handleExport = () => {
                const headers = ["ID", "Nom", "Ville", "Département", "Type", "Catégorie", "URL", "Email", "Adresse"];
                const rows = localData.map(i => [i.id, `"${i.name}"`, `"${i.city}"`, i.dept, i.type, i.cat, `"${i.url}"`, `"${i.email}"`, `"${i.address}"`]);
                const csvContent = "\uFEFF" + headers.join(";") + "\n" + rows.map(e => e.join(";")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); link.download = `edaya_${country}.csv`; link.click();
            };

            const deleteEntry = (fbKey) => { if (confirm("Supprimer ?")) db.ref(`opportunities_${country}/${fbKey}`).remove(); };

            const saveEntry = (e) => {
                e.preventDefault();
                if (modalMode === 'add') db.ref(`opportunities_${country}`).push({ ...activeEntry, id: Date.now() });
                else db.ref(`opportunities_${country}/${activeEntry.fbKey}`).set(activeEntry);
                setModalMode(null);
            };

            if (step === 'login') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-4">
                    <form onSubmit={handleLogin} className="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
                        <h1 className="text-2xl font-black italic mb-6 tracking-tighter uppercase">EDAYA MAP ACCESS</h1>
                        <input type="password" placeholder="Mot de passe" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-white/10 mb-4 text-center font-bold outline-none shadow-inner" value={pass} onChange={e => setPass(e.target.value)} />
                        <button type="submit" className="w-full py-4 bg-indigo-600 rounded-xl font-black uppercase tracking-widest text-sm shadow-xl hover:bg-indigo-500 transition-colors">Entrer</button>
                    </form>
                </div>
            );

            if (step === 'menu') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-4 text-center">
                    <div className="w-full max-w-md">
                        <h2 className="text-3xl font-black mb-8 uppercase tracking-tighter italic">ZONE DE PROSPECTION</h2>
                        <div className="grid grid-cols-1 gap-4">
                            <button onClick={() => { setCountry('france'); setStep('map'); }} className="glass p-12 rounded-3xl hover:bg-indigo-600 transition-all border border-white/5 group">
                                <span className="text-5xl mb-2 block group-hover:scale-110 transition-transform">🇫🇷</span>
                                <h3 className="font-black uppercase tracking-tighter text-xl">FRANCE</h3>
                            </button>
                            <button onClick={() => { setCountry('belgium'); setStep('map'); }} className="glass p-12 rounded-3xl hover:bg-indigo-600 transition-all border border-white/5 group">
                                <span className="text-5xl mb-2 block group-hover:scale-110 transition-transform">🇧🇪</span>
                                <h3 className="font-black uppercase tracking-tighter text-xl">BELGIQUE</h3>
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    <header className="bg-slate-900 border-b border-white/5 shadow-2xl p-3 z-50">
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-3">
                            <div className="flex items-center justify-between w-full sm:w-auto gap-4">
                                <button onClick={() => { setStep('menu'); setSelectedDept(null); }} className="bg-slate-800 p-2 rounded-lg flex items-center gap-1 text-[10px] font-black uppercase">
                                    <Icon name="back" /> <span className="hidden sm:inline">RETOUR</span>
                                </button>
                                <h1 className="font-black italic text-lg lg:text-xl uppercase tracking-tighter">EDAYA MAP</h1>
                                <button onClick={() => { setModalMode('add'); setActiveEntry({ name: '', city: '', dept: '', type: 'Lieu', cat: 'Accessible', address: '' }); }} className="sm:hidden bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-500/20"><Icon name="plus" /></button>
                            </div>
                            
                            <div className="header-scroll flex items-center gap-2 flex-1 justify-end">
                                <button onClick={() => { setModalMode('add'); setActiveEntry({ name: '', city: '', dept: '', type: 'Lieu', cat: 'Accessible', address: '' }); }} className="bg-indigo-600 px-3 py-2 rounded-lg flex items-center gap-2 text-[10px] font-black shadow-lg shadow-indigo-500/20">
                                    <Icon name="plus" /> AJOUTER
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="bg-slate-700 px-3 py-2 rounded-lg flex items-center gap-2 text-[10px] font-black flex-shrink-0">
                                    <Icon name="upload" /> IMPORTER CSV
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".csv" onChange={handleImport} />
                                <button onClick={handleExport} className="bg-emerald-600 px-3 py-2 rounded-lg flex items-center gap-2 text-[10px] font-black flex-shrink-0">
                                    <Icon name="download" /> EXPORTER CSV
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="app-grid flex-grow relative overflow-hidden">
                        {/* SIDEBAR / CARTE */}
                        <div className="sidebar-map flex flex-col overflow-hidden">
                            <div className="p-3 bg-slate-900/40 border-b border-white/5">
                                <div className="grid grid-cols-2 gap-2">
                                    <select onChange={(e) => { setFilters(p => ({ ...p, type: e.target.value })); setSelectedDept(null); }} className="p-2 bg-slate-800 rounded-lg text-[10px] font-black outline-none border border-white/10 text-white cursor-pointer shadow-inner">
                                        <option value="All">TOUT TYPE</option><option>Lieu</option><option>Festival</option><option>Booker</option><option>Media Spé</option>
                                    </select>
                                    <select onChange={(e) => { setFilters(p => ({ ...p, cat: e.target.value })); setSelectedDept(null); }} className="p-2 bg-slate-800 rounded-lg text-[10px] font-black outline-none border border-white/10 text-white cursor-pointer shadow-inner">
                                        <option value="All">STATUT</option><option>Accessible</option><option>Plus tard</option>
                                    </select>
                                </div>
                            </div>
                            <div className="map-wrapper" onClick={() => setSelectedDept(null)}>
                                {(country === 'france' && geoPaths.length === 0) ? <div className="animate-pulse font-black text-[10px] opacity-30">Chargement carte...</div> : (
                                    <svg viewBox={country === 'france' ? "0 0 600 650" : "0 0 600 650"} className="france-svg">
                                        {country === 'france' ? geoPaths.map(dept => (
                                            <path key={dept.id} d={renderPath(dept.geometry)} 
                                                className={`dept-path ${String(selectedDept) === String(dept.id) ? 'selected' : ''} ${deptsWithData.has(String(dept.id)) ? 'has-data' : ''}`}
                                                onClick={(e) => { e.stopPropagation(); setSelectedDept(selectedDept === dept.id ? null : dept.id); if(window.innerWidth < 1024) setIsSheetOpen(true); }} />
                                        )) : (
                                            // BELGIQUE VECTORIELLE (Basé sur image PNG)
                                            <g onClick={(e) => e.stopPropagation()}>
                                                {/* Flandre Occidentale */}
                                                <path d="M 50,150 L 120,120 L 160,170 L 100,220 L 40,200 Z" className={`dept-path ${selectedDept === 'Flandre Occidentale' ? 'selected' : ''}`} onClick={() => setSelectedDept('Flandre Occidentale')} />
                                                <text x="80" y="180" class="province-label">Fl. Occ.</text>
                                                {/* Flandre Orientale */}
                                                <path d="M 120,120 L 210,110 L 230,160 L 190,210 L 160,170 Z" className={`dept-path ${selectedDept === 'Flandre Orientale' ? 'selected' : ''}`} onClick={() => setSelectedDept('Flandre Orientale')} />
                                                <text x="170" y="165" class="province-label">Fl. Ori.</text>
                                                {/* Anvers */}
                                                <path d="M 210,110 L 300,100 L 320,140 L 260,180 L 230,160 Z" className={`dept-path ${selectedDept === 'Anvers' ? 'selected' : ''}`} onClick={() => setSelectedDept('Anvers')} />
                                                <text x="260" y="145" class="province-label">Anvers</text>
                                                {/* Limbourg */}
                                                <path d="M 300,100 L 380,110 L 360,200 L 320,140 Z" className={`dept-path ${selectedDept === 'Limbourg' ? 'selected' : ''}`} onClick={() => setSelectedDept('Limbourg')} />
                                                <text x="335" y="155" class="province-label">Limb.</text>
                                                {/* Brabant Flamand (autour de Bruxelles) */}
                                                <path d="M 230,160 L 260,180 L 320,140 L 360,200 L 330,230 L 270,210 L 230,160" className={`dept-path ${selectedDept === 'Brabant Flamand' ? 'selected' : ''}`} onClick={() => setSelectedDept('Brabant Flamand')} />
                                                <text x="280" y="195" class="province-label">Br. Fl.</text>
                                                {/* Bruxelles-Capitale (centre) */}
                                                <circle cx="275" cy="185" r="15" fill="#ad3214" stroke="#daa520" stroke-width="2" className="cursor-pointer" onClick={() => setSelectedDept('Bruxelles')} />
                                                <text x="275" y="188" class="province-label" fill="#daa520">BXL</text>
                                                {/* Hainaut */}
                                                <path d="M 100,220 L 190,210 L 230,160 L 270,210 L 240,260 L 130,280 L 100,220 Z" className={`dept-path ${selectedDept === 'Hainaut' ? 'selected' : ''}`} onClick={() => setSelectedDept('Hainaut')} />
                                                <text x="160" y="255" class="province-label">Hainaut</text>
                                                {/* Brabant Wallon */}
                                                <path d="M 240,260 L 270,210 L 330,230 L 350,270 L 310,290 L 240,260 Z" className={`dept-path ${selectedDept === 'Brabant Wallon' ? 'selected' : ''}`} onClick={() => setSelectedDept('Brabant Wallon')} />
                                                <text x="290" y="260" class="province-label">Br. Wal.</text>
                                                {/* Liège */}
                                                <path d="M 350,270 L 380,310 L 480,250 L 460,180 L 380,110 L 360,200 L 330,230 L 350,270 Z" className={`dept-path ${selectedDept === 'Liège' ? 'selected' : ''}`} onClick={() => setSelectedDept('Liège')} />
                                                <text x="420" y="230" class="province-label">Liège</text>
                                                {/* Namur */}
                                                <path d="M 240,260 L 310,290 L 350,270 L 380,310 L 350,370 L 270,340 L 240,260 Z" className={`dept-path ${selectedDept === 'Namur' ? 'selected' : ''}`} onClick={() => setSelectedDept('Namur')} />
                                                <text x="310" y="330" class="province-label">Namur</text>
                                                {/* Luxembourg */}
                                                <path d="M 350,370 L 380,310 L 480,250 L 520,340 L 430,410 L 350,370 Z" className={`dept-path ${selectedDept === 'Luxembourg' ? 'selected' : ''}`} onClick={() => setSelectedDept('Luxembourg')} />
                                                <text x="440" y="340" class="province-label">Lux.</text>
                                            </g>
                                        )}
                                    </svg>
                                )}
                            </div>
                        </div>

                        {/* LISTE OPPORTUNITÉS */}
                        <div className={`content-scroll mobile-bottom-sheet ${isSheetOpen ? 'sheet-open' : 'sheet-closed'} lg:translate-y-0 flex flex-col overflow-hidden bg-slate-950 p-0 lg:p-8 border-t lg:border-t-0 border-white/5`}>
                            <div className="p-3 flex items-center justify-center lg:hidden" onClick={() => setIsSheetOpen(!isSheetOpen)}>
                                <div className="w-10 h-1 bg-slate-700 rounded-full"></div>
                            </div>
                            
                            <div className="p-4 lg:p-0 flex justify-between items-end mb-4 lg:mb-6 lg:border-b-2 lg:border-indigo-600 pb-1 lg:pb-2">
                                <h2 className="text-xl lg:text-4xl font-black uppercase italic tracking-tighter">
                                    {selectedDept ? `Zone ${selectedDept}` : "Opportunités"}
                                </h2>
                                {selectedDept && <button onClick={() => setSelectedDept(null)} className="text-[8px] lg:text-[10px] bg-white/10 px-2 py-1 rounded font-black uppercase tracking-widest hover:bg-white/20 transition-all">Voir tout</button>}
                            </div>

                            <div className="flex-grow overflow-y-auto custom-scrollbar space-y-3 p-4 lg:p-0 pb-12">
                                {filteredData.length > 0 ? filteredData.map(item => (
                                    <div key={item.fbKey} className="glass p-4 rounded-2xl animate-in border border-white/5 hover:border-indigo-500/30 transition-all shadow-lg">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1 min-w-0 pr-2">
                                                <h4 className="font-black uppercase truncate text-sm lg:text-lg">{item.name}</h4>
                                                <div className="flex flex-wrap gap-2 mt-1">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase bg-white/5 px-2 py-0.5 rounded-md">{item.city} ({item.dept})</span>
                                                    <span className="text-[9px] font-black px-2 py-0.5 bg-indigo-500/20 text-indigo-400 rounded-md uppercase border border-indigo-500/30 uppercase">{item.type}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-1 flex-shrink-0">
                                                <button onClick={() => { setModalMode('edit'); setActiveEntry(item); }} className="p-1.5 text-indigo-400 hover:bg-white/10 rounded-lg transition-colors"><Icon name="edit" /></button>
                                                <button onClick={() => deleteEntry(item.fbKey)} className="p-1.5 text-red-500/70 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-colors"><Icon name="trash" /></button>
                                            </div>
                                        </div>
                                        <p className="text-[10px] lg:text-xs text-slate-400 mt-2 italic line-clamp-2">{item.address || "..."}</p>
                                    </div>
                                )) : <div className="text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-widest italic">Aucun résultat</div>}
                            </div>
                        </div>
                    </div>

                    {modalMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
                            <div className="glass w-full max-w-md rounded-[2rem] overflow-hidden animate-in shadow-2xl">
                                <div className="bg-slate-900 p-6 flex justify-between items-center border-b border-white/5">
                                    <h3 className="font-black uppercase text-sm italic tracking-tighter">{modalMode === 'add' ? 'Ajouter' : 'Modifier'}</h3>
                                    <button onClick={() => setModalMode(null)} className="p-2 text-slate-400 hover:text-white"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={saveEntry} className="p-6 space-y-3">
                                    <input required placeholder="Nom structure" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-white/10 font-bold text-xs outline-none focus:border-indigo-500 transition-colors" value={activeEntry.name} onChange={e => setActiveEntry({...activeEntry, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Ville" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-white/10 font-bold text-xs outline-none focus:border-indigo-500" value={activeEntry.city} onChange={e => setActiveEntry({...activeEntry, city: e.target.value})} />
                                        <input required placeholder="Zone (Province ou CP)" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-white/10 font-bold text-xs outline-none focus:border-indigo-500" value={activeEntry.dept} onChange={e => setActiveEntry({...activeEntry, dept: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-4 bg-slate-900 text-white rounded-xl border border-white/10 text-[10px] font-black" value={activeEntry.type} onChange={e => setActiveEntry({...activeEntry, type: e.target.value})}><option>Lieu</option><option>Festival</option><option>Booker</option><option>Media Spé</option></select>
                                        <select className="p-4 bg-slate-900 text-white rounded-xl border border-white/10 text-[10px] font-black" value={activeEntry.cat} onChange={e => setActiveEntry({...activeEntry, cat: e.target.value})}><option>Accessible</option><option>Plus tard</option></select>
                                    </div>
                                    <textarea placeholder="Notes / Adresse" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-white/10 font-bold text-xs outline-none focus:border-indigo-500" rows="3" value={activeEntry.address} onChange={e => setActiveEntry({...activeEntry, address: e.target.value})} />
                                    <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black uppercase tracking-widest text-[10px] shadow-lg hover:bg-indigo-500 transition-all">Enregistrer</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
